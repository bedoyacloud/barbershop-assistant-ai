<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sharp &amp; Co. — Barbershop Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body { font-family: 'Inter', sans-serif; }
      .typing span {
        width: 6px; height: 6px; background: #94a3b8; border-radius: 50%;
        display: inline-block; margin: 0 2px; animation: blink 1.2s infinite;
      }
      .typing span:nth-child(2) { animation-delay: 0.2s; }
      .typing span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes blink { 0%, 60%, 100% { opacity: 0.2; } 30% { opacity: 1; } }
    </style>
  </head>
  <body class="bg-slate-100 min-h-screen">
    <div class="max-w-2xl mx-auto p-4 flex flex-col h-screen">
      <header class="mb-4 flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold text-slate-800">Sharp &amp; Co.</h1>
          <p class="text-sm text-slate-500">Barbershop AI assistant · Madrid</p>
        </div>
        <div class="flex items-center gap-2">
          <label for="model" class="text-xs text-slate-500">Model</label>
          <select
            id="model"
            class="text-sm rounded-md border-slate-300 bg-white px-2 py-1 shadow-sm"
          >
            <option value="qwen2.5:7b">qwen2.5:7b ⚡</option>
            <option value="qwen2.5:3b">qwen2.5:3b</option>
            <option value="llama3.2:3b">llama3.2:3b</option>
            <option value="llama3.1:8b">llama3.1:8b</option>
          </select>
        </div>
      </header>

      <main
        id="chat"
        class="flex-1 overflow-y-auto bg-white rounded-xl shadow p-4 space-y-3"
      ></main>

      <footer class="mt-3">
        <form id="form" class="flex gap-2">
          <input
            id="input"
            type="text"
            placeholder="Escribe un mensaje…"
            autocomplete="off"
            class="flex-1 rounded-xl border-slate-300 px-4 py-3 shadow-sm focus:ring-2 focus:ring-slate-500 focus:border-transparent"
          />
          <button
            id="send"
            type="submit"
            class="bg-slate-800 text-white rounded-xl px-5 py-3 font-semibold hover:bg-slate-900 disabled:opacity-50"
          >
            Send
          </button>
        </form>
        <p id="status" class="text-xs text-slate-400 mt-2 text-center"></p>
      </footer>
    </div>
    <script src="/static/app.js?v=2"></script>
  </body>
</html>
