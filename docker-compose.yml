services:
  ollama:
    image: ollama/ollama:latest
    container_name: barber-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    build: .
    container_name: barber-app
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:3b
      APPOINTMENTS_DB: /data/appointments.sqlite
    volumes:
      - app_data:/data
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: barber-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9091:9090"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: barber-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/barber.json:ro
    ports:
      - "3001:3000"

volumes:
  ollama_data:
  app_data:
  prometheus_data:
  grafana_data:
